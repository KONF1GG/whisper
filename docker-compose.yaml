services:
  app:
    build: .
    restart: always
    container_name: whisper
    env_file:
      - .env
    environment:
      - TZ=Asia/Yekaterinburg
    volumes:
      - ~/.cache/huggingface/hub:/root/.cache/huggingface/hub
      - shared-data:/shared
      - ./logs:/app/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import torch; exit(0 if torch.cuda.is_available() else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  asterisk-monitor:
    build: .
    restart: always
    container_name: asterisk-monitor
    env_file:
      - .env
    environment:
      - TZ=Asia/Yekaterinburg
    volumes:
      - ./logs:/app/logs
      - /opt/python/logs:/opt/python/logs
    command: ["python", "aster.py"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  shared-data:
    external: true